<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стяжка 1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@capacitor/core@6/dist/capacitor.js"></script>
<style>
:root{--primary:#4b5563;--bg:#f3f4f6;--card:#fff;--text:#1f2937;--success:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px}
.header{background:var(--card);padding:14px 20px;text-align:center;position:sticky;top:0}
.page{display:none;padding:16px;max-width:640px;margin:0 auto}.page.active{display:block}
.btn{padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;margin:5px;cursor:pointer}
.room-card{background:var(--card);padding:14px;margin:10px 0;border-radius:10px}
input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:6px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}.modal-box{background:#fff;padding:24px;border-radius:16px;max-width:340px;width:90%}
.modal-btn{padding:14px;border:none;border-radius:10px;margin:5px 0;width:100%}
.btn-primary{background:var(--primary);color:#fff}.btn-success{background:var(--success);color:#fff}
.pdf-hidden{position:absolute;left:-9999px}.pdf-sheet{background:#fff;padding:20px}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:10px;z-index:300}
.saved-list{list-style:none}.saved-item{background:var(--card);padding:14px;margin:10px 0;border-radius:10px}
</style>
</head>
<body>
<div class="header"><h1>📐 Стяжка 1</h1><button class="btn" onclick="toggleTheme()" id="themeBtn">🌙</button></div>

<div class="page active" id="pageMeasurements">
  <div class="address-block" style="background:var(--card);padding:14px;margin:10px 0;border-radius:10px">
    <input type="date" id="measDate"><input type="text" id="clientName" placeholder="Заказчик"><input type="text" id="addressInput" placeholder="Адрес">
  </div>
  <div id="roomsContainer"></div>
  <button class="btn" onclick="addRoom()" style="width:100%">+ Комната</button>
  <div class="summary-card" style="background:var(--primary);color:#fff;padding:16px;margin:10px 0;border-radius:10px">
    <div>Площадь: <span id="totalArea">0</span> м²</div>
    <div>Слой: <span id="avgLayer">0</span> см</div>
  </div>
  <button class="btn" onclick="saveMeasurement()" style="width:100%">💾 Сохранить</button>
</div>

<div class="page" id="pageCost"><div id="costResult"></div></div>

<div class="page" id="pageHistory">
  <h2>📁 Архив</h2>
  <ul class="saved-list" id="savedList"></ul>
</div>

<div class="page" id="pageSettings">
  <h2>⚙️ Настройки</h2>
  <input type="number" id="sandPrice" placeholder="Цена песка" value="150" oninput="saveSettings()">
  <input type="number" id="cementPrice" placeholder="Цена цемента" value="350" oninput="saveSettings()">
  <input type="number" id="laborPrice" placeholder="Цена работы" value="450" oninput="saveSettings()">
  <button class="btn" onclick="clearAllData()">🗑 Сброс</button>
</div>

<div class="modal" id="pdfModal">
  <div class="modal-box">
    <h3 id="modalTitle">PDF</h3>
    <p id="modalText">Готово!</p>
    <button class="modal-btn btn-primary" onclick="startPDF('download')">📥 Скачать</button>
    <button class="modal-btn btn-success" onclick="startPDF('share')">📤 Отправить</button>
    <button class="modal-btn" onclick="closeModal()">Отмена</button>
  </div>
</div>

<div class="pdf-hidden" id="pdfMeasTpl">
  <div class="pdf-sheet" id="pdfMeasCont">
    <h1>📐 ЛИСТ ЗАМЕРА</h1>
    <div id="pdfMeasAddr"></div>
    <table id="pdfMeasRows" style="width:100%;margin:10px 0"></table>
  </div>
</div>

<div class="pdf-hidden" id="pdfCostTpl">
  <div class="pdf-sheet" id="pdfCostCont">
    <h1>💰 КП</h1>
    <div id="pdfCostRows"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let rooms=[],editingId=null,roomUid=0,currentCalc=null,pdfData={blob:null,name:''};
let corrections={globalMm:3,perRoomMm:0,enabled:true};

document.addEventListener('DOMContentLoaded',()=>{
  loadSettings();loadTheme();
  document.getElementById('measDate').value=new Date().toISOString().split('T')[0];
  addRoom();renderHistory();
});

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function toggleTheme(){document.body.classList.toggle('dark');document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';}
function loadTheme(){if(localStorage.getItem('darkMode')==='1'){document.body.classList.add('dark');document.getElementById('themeBtn').textContent='☀️';}}
function switchTab(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function closeModal(){document.getElementById('pdfModal').classList.remove('show');}

function addRoom(){roomUid++;rooms.push({id:'r_'+Date.now()+'_'+roomUid,name:'Комната '+(rooms.length+1),area:0,layer:0});renderRooms();}
function removeRoom(id){rooms=rooms.filter(r=>r.id!==id);renderRooms();}
function updateRoom(id,f,v){const r=rooms.find(x=>x.id===id);if(r)r[f]=v;recalcSummary();}
function renderRooms(){const c=document.getElementById('roomsContainer');c.innerHTML=rooms.map((r,i)=>`<div class="room-card"><h3>${r.name}</h3><input type="text" value="${r.name}" oninput="updateRoom('${r.id}','name',this.value)"><input type="number" step="0.01" placeholder="Площадь (м²)" value="${r.area||''}" oninput="updateRoom('${r.id}','area',this.value)"><input type="number" step="0.1" placeholder="Слой (см)" value="${r.layer||''}" oninput="updateRoom('${r.id}','layer',this.value)"><button class="btn" onclick="removeRoom('${r.id}')" style="background:#ef4444">Удалить</button></div>`).join('');}
function recalcSummary(){let ta=0,w=0;rooms.forEach(r=>{const a=parseFloat(r.area)||0,l=parseFloat(r.layer)||0;if(a>0){ta+=a;w+=(a*l);}});document.getElementById('totalArea').textContent=ta.toFixed(2);document.getElementById('avgLayer').textContent=(ta>0?(w/ta):0).toFixed(1);}
function saveMeasurement(){const addr=document.getElementById('addressInput').value.trim();if(!addr)return showToast('⚠️ Введите адрес');const data={id:editingId||'m_'+Date.now(),address:addr,client:document.getElementById('clientName').value,date:document.getElementById('measDate').value,rooms:JSON.parse(JSON.stringify(rooms)),totalArea:parseFloat(document.getElementById('totalArea').textContent),avgLayer:parseFloat(document.getElementById('avgLayer').textContent)};let db=getDB();if(editingId){const i=db.findIndex(m=>m.id===editingId);if(i!==-1)db[i]=data;}else db.push(data);localStorage.setItem('screed_final',JSON.stringify(db));showToast('✅ Сохранено');clearForm();}
function getDB(){return JSON.parse(localStorage.getItem('screed_final')||'[]');}
function clearForm(){document.getElementById('addressInput').value='';document.getElementById('clientName').value='';rooms=[];editingId=null;addRoom();}
function renderHistory(){const db=getDB();document.getElementById('savedList').innerHTML=db.map(m=>`<li class="saved-item"><strong>${m.address}</strong><br><small>${m.date||''} • ${m.totalArea} м²</small><br><button class="btn" onclick="showMeasPDFModal('${m.id}')">📄 PDF</button> <button class="btn" onclick="calcFromArchive('${m.id}')" style="background:var(--success)">💰 Расчёт</button></li>`).join('');}
function calcFromArchive(id){const m=getDB().find(x=>x.id===id);if(!m)return;currentCalc={m,s:getSettings(),area:m.totalArea,layer:m.avgLayer,total:m.totalArea*m.avgLayer*2000};document.getElementById('costResult').innerHTML=`<div class="room-card"><h3>Расчёт</h3><p>Площадь: ${m.totalArea} м²</p><p>Слой: ${m.avgLayer} см</p><p>Примерная стоимость: ${currentCalc.total.toLocaleString()} ₽</p><button class="btn btn-success" onclick="showCostPDFModal()" style="width:100%">📥 PDF</button></div>`;switchTab('pageCost');}

// === 🎯 РАБОЧАЯ ФУНКЦИЯ СОХРАНЕНИЯ PDF ===
async function startPDF(action){
  if(!pdfData.blob){showToast('⚠️ Файл не создан');return;}
  showToast('⏳ Сохранение...');
  
  try{
    // Пробуем Capacitor (для APK)
    if(typeof Capacitor!=='undefined'&&Capacitor.Plugins?.Filesystem){
      const base64=await new Promise((res,rej)=>{
        const reader=new FileReader();
        reader.onloadend=()=>res(reader.result.split(',')[1]);
        reader.onerror=rej;
        reader.readAsDataURL(pdfData.blob);
      });
      
      const fileName='Screed1_'+Date.now()+'.pdf';
      const path='Download/'+fileName;
      
      await Capacitor.Plugins.Filesystem.writeFile({
        path:path,data:base64,directory:Capacitor.Plugins.Filesystem.Directory.External
      });
      
      showToast('✅ Сохранено: Download/'+fileName);
      
      if(action==='share'&&Capacitor.Plugins?.Share){
        const uri=await Capacitor.Plugins.Filesystem.getUri({path:path,directory:Capacitor.Plugins.Filesystem.Directory.External});
        await Capacitor.Plugins.Share.share({title:'Документ',url:uri.uri});
      }
      return;
    }
    
    // Fallback для браузера
    const url=URL.createObjectURL(pdfData.blob);
    const a=document.createElement('a');
    a.href=url;a.download='Screed1_'+Date.now()+'.pdf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ Скачано');
  }catch(e){
    console.error(e);showToast('⚠️ Ошибка: '+e.message);
  }
}

async function preparePDF(tplId,contId,name){
  const tpl=document.getElementById(tplId);tpl.style.display='block';
  const opt={margin:[5,5,5,5],filename:name,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4'}};
  try{
    await new Promise(r=>setTimeout(r,300));
    pdfData.blob=await html2pdf().set(opt).from(document.getElementById(contId)).outputPdf('blob');
    tpl.style.display='none';pdfData.name=name;showToast('✅ PDF готов');
    document.getElementById('pdfModal').classList.add('show');
  }catch(e){showToast('⚠️ Ошибка PDF');console.error(e);}
}

function showMeasPDFModal(id){const m=getDB().find(x=>x.id===id);if(!m)return;document.getElementById('pdfMeasAddr').textContent=m.address;document.getElementById('modalTitle').textContent='📄 Лист замера';preparePDF('pdfMeasTpl','pdfMeasCont','meas_'+id+'.pdf');}
function showCostPDFModal(){if(!currentCalc)return;document.getElementById('pdfCostRows').textContent='Стоимость: '+currentCalc.total.toLocaleString()+' ₽';document.getElementById('modalTitle').textContent='💰 КП';preparePDF('pdfCostTpl','pdfCostCont','cost.pdf');}

function getSettings(){return{sandPrice:parseFloat(document.getElementById('sandPrice').value)||150,cementPrice:parseFloat(document.getElementById('cementPrice').value)||350,laborPrice:parseFloat(document.getElementById('laborPrice').value)||450};}
function saveSettings(){['sandPrice','cementPrice','laborPrice'].forEach(id=>localStorage.setItem(id,document.getElementById(id).value));}
function loadSettings(){['sandPrice','cementPrice','laborPrice'].forEach(id=>{if(localStorage.getItem(id))document.getElementById(id).value=localStorage.getItem(id);});}
function clearAllData(){if(confirm('Удалить всё?')){localStorage.clear();location.reload();}}

window.startPDF=startPDF;window.closeModal=closeModal;window.showMeasPDFModal=showMeasPDFModal;window.showCostPDFModal=showCostPDFModal;window.preparePDF=preparePDF;window.showToast=showToast;window.addRoom=addRoom;window.removeRoom=removeRoom;window.updateRoom=updateRoom;window.saveMeasurement=saveMeasurement;window.calcFromArchive=calcFromArchive;window.switchTab=switchTab;window.clearAllData=clearAllData;
console.log('✅ App loaded');
</script>
</body>
</html>
