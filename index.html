<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Стяжка Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/core@6/dist/capacitor.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-size: 16px; margin: 5px; }
        .toast { position: fixed; bottom: 50px; left: 20px; right: 20px; background: #333; color: white; padding: 12px; border-radius: 10px; text-align: center; display: none; z-index: 1000; }
        .page { display: none; }
        .page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: white; padding: 10px; }
        .nav-btn { flex: 1; text-align: center; background: none; color: #666; }
        .nav-btn.active { color: #2563eb; }
        .room-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn-add-room { background: #10b981; width: 100%; margin-top: 10px; }
        .summary-card { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1001; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .modal-btn { padding: 8px 16px; border-radius: 8px; border: none; }
        .modal-btn-primary { background: #2563eb; color: white; }
        .modal-btn-success { background: #10b981; color: white; }
        .pdf-hidden { display: none; }
        .pdf-sheet { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="page active" id="pageMeasurements">
    <h1>📐 Стяжка Pro</h1>
    <div id="roomsContainer"></div>
    <button class="btn-add-room" onclick="addRoom()">＋ Добавить комнату</button>
    <div class="summary-card">
        <h3>Итог</h3>
        <div id="totalArea">0 м²</div>
    </div>
    <button onclick="saveMeasurement()">💾 Сохранить замер</button>
    <button onclick="showPDFModal()">📄 Лист замера</button>
</div>

<div class="page" id="pageHistory">
    <h1>📁 История</h1>
    <div id="savedList"></div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('pageMeasurements')">📐 Замеры</button>
    <button class="nav-btn" onclick="switchTab('pageHistory')">📁 История</button>
</div>

<div class="modal-overlay" id="pdfModal">
    <div class="modal-box">
        <h3>Лист замера</h3>
        <div class="modal-btns">
            <button class="modal-btn modal-btn-primary" onclick="generateAndDownloadPDF()">📥 Сохранить PDF</button>
            <button class="modal-btn modal-btn-success" onclick="generateAndSharePDF()">📤 Отправить</button>
            <button class="modal-btn" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<div id="pdfMeasTpl" class="pdf-hidden">
    <div class="pdf-sheet">
        <h2>📄 Лист замера</h2>
        <p><strong>Дата:</strong> <span id="pdfDate"></span></p>
        <p><strong>Общая площадь:</strong> <span id="pdfArea"></span> м²</p>
        <hr>
        <p>Документ создан в приложении "Стяжка Pro"</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let rooms = [{ id: 'room1', name: 'Комната 1', area: 0, layer: 0 }];
    let currentMeasurementId = null;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'pageHistory') renderHistory();
    }

    function addRoom() {
        rooms.push({ id: 'room' + Date.now(), name: 'Комната ' + (rooms.length + 1), area: 0, layer: 0 });
        renderRooms();
    }

    function renderRooms() {
        const c = document.getElementById('roomsContainer');
        if (!c) return;
        c.innerHTML = rooms.map((r, i) => `
            <div class="room-card">
                <b>${r.name}</b><br>
                Площадь: <input type="number" value="${r.area}" onchange="updateRoom('${r.id}', 'area', this.value)"> м²<br>
                Слой: <input type="number" value="${r.layer}" onchange="updateRoom('${r.id}', 'layer', this.value)"> см
            </div>
        `).join('');
        recalcSummary();
    }

    function updateRoom(id, field, value) {
        const r = rooms.find(x => x.id === id);
        if (r) r[field] = parseFloat(value) || 0;
        recalcSummary();
    }

    function recalcSummary() {
        let totalArea = 0;
        rooms.forEach(r => totalArea += r.area);
        document.getElementById('totalArea').innerHTML = `Общая площадь: ${totalArea.toFixed(2)} м²`;
        return totalArea;
    }

    function saveMeasurement() {
        const totalArea = recalcSummary();
        const data = { id: Date.now().toString(), rooms: JSON.parse(JSON.stringify(rooms)), totalArea, date: new Date().toISOString() };
        let saved = JSON.parse(localStorage.getItem('measurements') || '[]');
        saved.push(data);
        localStorage.setItem('measurements', JSON.stringify(saved));
        showToast('✅ Сохранено!');
        renderHistory();
    }

    function renderHistory() {
        const saved = JSON.parse(localStorage.getItem('measurements') || '[]');
        const container = document.getElementById('savedList');
        if (!container) return;
        if (saved.length === 0) {
            container.innerHTML = '<p>Нет сохранённых замеров</p>';
            return;
        }
        container.innerHTML = saved.map(m => `
            <div class="room-card">
                <b>📅 ${new Date(m.date).toLocaleDateString()}</b><br>
                Площадь: ${m.totalArea.toFixed(2)} м²<br>
                <button onclick="loadMeasurement('${m.id}')">📂 Загрузить</button>
                <button onclick="deleteMeasurement('${m.id}')">🗑 Удалить</button>
            </div>
        `).join('');
    }

    function loadMeasurement(id) {
        const saved = JSON.parse(localStorage.getItem('measurements') || '[]');
        const m = saved.find(x => x.id === id);
        if (m) {
            rooms = JSON.parse(JSON.stringify(m.rooms));
            renderRooms();
            switchTab('pageMeasurements');
            showToast('📂 Замер загружен');
        }
    }

    function deleteMeasurement(id) {
        let saved = JSON.parse(localStorage.getItem('measurements') || '[]');
        saved = saved.filter(x => x.id !== id);
        localStorage.setItem('measurements', JSON.stringify(saved));
        renderHistory();
        showToast('🗑 Удалено');
    }

    function showPDFModal() {
        document.getElementById('pdfModal').classList.add('show');
        const totalArea = recalcSummary();
        document.getElementById('pdfDate').textContent = new Date().toLocaleString();
        document.getElementById('pdfArea').textContent = totalArea.toFixed(2);
    }

    function closeModal() {
        document.getElementById('pdfModal').classList.remove('show');
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    async function generateAndDownloadPDF() {
        showToast('⏳ Генерация PDF...');
        const tpl = document.getElementById('pdfMeasTpl');
        tpl.style.display = 'block';
        const opt = {
            margin: [5,5,5,5],
            filename: 'ЛистЗамера_' + Date.now() + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        try {
            const blob = await html2pdf().set(opt).from(tpl).outputPdf('blob');
            tpl.style.display = 'none';
            closeModal();

            if (typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform()) {
                const { Filesystem, Directory, Share } = Capacitor.Plugins;
                const fileName = opt.filename;
                const base64 = await blobToBase64(blob);
                
                await Filesystem.mkdir({ path: 'PDF', directory: Directory.Data, recursive: true }).catch(() => {});
                await Filesystem.writeFile({
                    path: `PDF/${fileName}`,
                    data: base64,
                    directory: Directory.Data,
                    recursive: true
                });
                
                showToast('✅ PDF сохранён! Открываем диалог...');
                await Share.share({
                    title: fileName,
                    text: 'Документ из Стяжка Pro',
                    dialogTitle: 'Поделиться PDF'
                });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = opt.filename;
                a.click();
                URL.revokeObjectURL(url);
                showToast('✅ PDF скачан');
            }
        } catch (e) {
            console.error(e);
            tpl.style.display = 'none';
            showToast('⚠️ Ошибка: ' + e.message);
        }
    }

    async function generateAndSharePDF() {
        await generateAndDownloadPDF();
    }

    renderRooms();
</script>
</body>
</html>
