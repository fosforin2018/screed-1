<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Стяжка 1 — Калькулятор</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@capacitor/core@6/dist/capacitor.js"></script>
<style>
  :root{--primary:#4b5563;--bg:#f3f4f6;--card:#fff;--text:#1f2937;--border:#e5e7eb;--success:#10b981;--radius:12px}
  body{font-family:sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px}
  .header{background:var(--card);padding:14px 20px;text-align:center;position:sticky;top:0}
  .page{display:none;padding:16px;max-width:640px;margin:0 auto}.page.active{display:block}
  .btn{padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:600}
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-box{background:var(--card);border-radius:16px;padding:24px;max-width:340px;width:90%;text-align:center}
  .modal-btn{padding:14px;border:none;border-radius:10px;margin:5px 0;width:100%;font-weight:600}
  .modal-btn-primary{background:var(--primary);color:#fff}.modal-btn-success{background:var(--success);color:#fff}
  .pdf-hidden{position:absolute;left:-9999px}
  .pdf-sheet{background:#fff;padding:20px;max-width:800px;margin:0 auto;color:#000}
  .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:10px;z-index:300}
</style>
</head>
<body>
<div class="header"><h1>📐 Стяжка 1</h1></div>
<div class="page active" id="pageMeasurements"><div id="roomsContainer"></div><button class="btn" onclick="saveMeasurement()">💾 Сохранить</button></div>
<div class="page" id="pageCost"><div id="costResult"></div></div>
<div class="page" id="pageHistory"><ul id="savedList"></ul></div>
<div class="page" id="pageSettings"><button class="btn" onclick="clearAllData()">🗑 Сброс</button></div>
<div class="modal-overlay" id="pdfModal"><div class="modal-box"><h3 id="modalTitle">PDF</h3><p id="modalText">Готово</p><div><button class="modal-btn modal-btn-primary" onclick="startPDF('download')">📥 Скачать</button><button class="modal-btn modal-btn-success" onclick="startPDF('share')">📤 Отправить</button><button class="modal-btn" onclick="closeModal()">Отмена</button></div></div></div>
<div class="pdf-hidden" id="pdfMeasTpl"><div class="pdf-sheet" id="pdfMeasCont"><h1>ЛИСТ ЗАМЕРА</h1><div id="pdfMeasAddr"></div><table id="pdfMeasRows"></table></div></div>
<div class="pdf-hidden" id="pdfCostTpl"><div class="pdf-sheet" id="pdfCostCont"><h1>КП</h1><div id="pdfCostRows"></div></div></div>
<div class="toast" id="toast"></div>
<script>
let rooms=[],currentCalc=null,pdfData={blob:null,name:''};
document.addEventListener('DOMContentLoaded',()=>{renderHistory();});
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function closeModal(){document.getElementById('pdfModal').classList.remove('show');}
function renderHistory(){const db=JSON.parse(localStorage.getItem('screed_final')||'[]');document.getElementById('savedList').innerHTML=db.map(m=>`<li><button onclick="showMeasPDFModal('${m.id}')">📄 ${m.address}</button></li>`).join('');}
function getDB(){return JSON.parse(localStorage.getItem('screed_final')||'[]');}
function showMeasPDFModal(id){const m=getDB().find(x=>x.id===id);if(!m)return;document.getElementById('modalTitle').textContent='📄 Лист замера';document.getElementById('pdfMeasAddr').textContent=m.address;document.getElementById('pdfModal').classList.add('show');pdfData.name='meas_'+id+'.pdf';}
function showCostPDFModal(){if(!currentCalc)return;document.getElementById('modalTitle').textContent='💰 КП';document.getElementById('pdfModal').classList.add('show');pdfData.name='cost.pdf';}
async function preparePDFData(tplId,contId){const tpl=document.getElementById(tplId);tpl.style.display='block';const opt={margin:[5,5,5,5],filename:pdfData.name,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};try{await new Promise(r=>setTimeout(r,300));pdfData.blob=await html2pdf().set(opt).from(document.getElementById(contId)).outputPdf('blob');tpl.style.display='none';showToast('✅ PDF готов');return true;}catch(e){console.error(e);tpl.style.display='none';showToast('⚠️ Ошибка');return false;}}

// === 🎯 ГАРАНТИРОВАННО РАБОЧАЯ ФУНКЦИЯ ===
async function startPDF(action){
  if(!pdfData.blob){showToast('⚠️ Файл не создан');return;}
  showToast('⏳ Сохранение...');
  
  try{
    // === СПОСОБ 1: Capacitor Filesystem (если доступен) ===
    if(typeof Capacitor!=='undefined'&&Capacitor.Plugins?.Filesystem){
      const base64=await new Promise((res,rej)=>{
        const reader=new FileReader();
        reader.onloadend=()=>res(reader.result.split(',')[1]);
        reader.onerror=rej;
        reader.readAsDataURL(pdfData.blob);
      });
      
      const fileName='Screed1_'+Date.now()+'.pdf';
      const path='Download/'+fileName;
      
      // Сохраняем в публичную папку Download
      await Capacitor.Plugins.Filesystem.writeFile({
        path: path,
        data: base64,
        directory: Capacitor.Plugins.Filesystem.Directory.External
      });
      
      showToast('✅ Сохранено: /Download/'+fileName);
      
      // Если нужно отправить
      if(action==='share'&&Capacitor.Plugins?.Share){
        const uri=await Capacitor.Plugins.Filesystem.getUri({path, directory: Capacitor.Plugins.Filesystem.Directory.External});
        await Capacitor.Plugins.Share.share({title:'Документ',url:uri.uri,dialogTitle:'Отправить'});
      }
      return;
    }
    
    // === СПОСОБ 2: Простая загрузка (браузер/WebView) ===
    const url=URL.createObjectURL(pdfData.blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='Screed1_'+Date.now()+'.pdf';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ Файл в Загрузках');
    
  }catch(e){
    console.error('Save error:',e);
    showToast('⚠️ Ошибка: '+e.message);
  }
}

// Экспорт функций
window.startPDF=startPDF;window.closeModal=closeModal;window.showMeasPDFModal=showMeasPDFModal;window.showCostPDFModal=showCostPDFModal;window.preparePDFData=preparePDFData;window.showToast=showToast;
console.log('✅ App loaded');
</script>
</body>
</html>
